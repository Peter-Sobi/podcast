name: Update AUF1 Podcast Feed

on:
  schedule:
    - cron: "0 4 * * *"   # Jeden Tag um 04:00 Uhr
  workflow_dispatch:      # Manuelles Starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install requests

      - name: Run AUF1 feed generator
        run: python3 generate-feed-auf1.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add feed_auf1.xml media_auf1/
          git commit -m "Update AUF1 feed" || echo "No changes to commit"
          git push

