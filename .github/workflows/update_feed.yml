name: Update Podcast Feed

on:
  schedule:
    # Sommerzeit (MESZ): März–Oktober → 06:00 Uhr = 04:00 UTC
    - cron: "0 4 1-31 3-10 *"
    # Winterzeit (MEZ): Oktober–März → 06:00 Uhr = 05:00 UTC
    - cron: "0 5 1-31 10-3 *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install requests

      - name: Run feed generator
        run: python3 generate-feed.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated feed update" || echo "No changes to commit"
          git push

