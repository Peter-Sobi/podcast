name: Update Podcast Feed

on:
  schedule:
    - cron: "0 */6 * * *"   # alle 6 Stunden
  workflow_dispatch:        # manuelles Starten möglich

env:
  # Opt-in auf Node.js 24 für Actions, um Deprecation-Warnungen zu vermeiden
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate Feed
      run: |
        python generate-feed.py

    - name: Commit and Push feed.xml
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add feed.xml
        git commit -m "Automated feed update" || echo "No changes to commit"
        git push
